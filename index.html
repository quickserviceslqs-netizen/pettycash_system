<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Petty Cash System</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7faf8;
      --panel: #ffffff;
      --text: #11332c;
      --muted: #4f6f68;
      --accent: #0d7f5f;
      --border: #cfe2db;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, #ddf3eb 0%, transparent 50%),
        radial-gradient(circle at 80% 100%, #e8f5ef 0%, transparent 40%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    main {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 16px 42px rgba(10, 47, 37, 0.08);
    }
    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      letter-spacing: 0.01em;
    }
    p {
      margin: 0 0 1.1rem;
      line-height: 1.65;
      color: var(--muted);
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }
    .button {
      display: inline-block;
      padding: 0.55rem 0.9rem;
      border: 1px solid var(--accent);
      border-radius: 10px;
      transition: background-color 0.2s ease, color 0.2s ease;
    }
    .button:hover {
      background: var(--accent);
      color: #fff;
    }
  </style>
</head>
<body>
  <main>
    <h1>Petty Cash System</h1>
    <p>
      This repository hosts a multi-tenant Django application for petty cash
      requisitions, approvals, treasury workflows, and reporting.
    </p>
    <p>
      The GitHub Pages site is intentionally minimal and exists to ensure
      successful static publishing from this codebase.
    </p>
    <div class="actions">
      <a class="button" href="https://github.com/quickserviceslqs-netizen/pettycash_system">Open Repository</a>
    </div>
  </main>
</body>
</html>
