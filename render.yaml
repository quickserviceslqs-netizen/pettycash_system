services:
  - type: web
    name: pettycash-system
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn pettycash_system.wsgi:application --log-file -
    healthCheckPath: /maintenance/health/
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: SITE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: pettycash-db
          property: connectionString
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false

databases:
  - name: pettycash-db
    plan: free
    databaseName: pettycash
    user: pettycash